<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interior Design AI - Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a1a; padding: 2rem; }
    .container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem; }
    h1 { grid-column: 1 / -1; font-size: 1.5rem; color: #4a3728; margin-bottom: 0.5rem; }
    .subtitle { grid-column: 1 / -1; color: #666; margin-bottom: 1rem; }

    /* Left panel */
    .upload-panel { background: white; border-radius: 12px; padding: 1.5rem; border: 1px solid #e8e0d8; }
    .upload-panel h2 { font-size: 1rem; color: #4a3728; margin-bottom: 1rem; }
    .dropzone { border: 2px dashed #d4c8bc; border-radius: 8px; padding: 2rem 1rem; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .dropzone:hover { border-color: #8b6f5c; }
    .dropzone.dragover { border-color: #8b6f5c; background: #faf7f5; }
    .dropzone p { color: #666; font-size: 0.875rem; }
    .preview { position: relative; }
    .preview img { width: 100%; border-radius: 8px; }
    .preview button { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 1.1rem; }

    /* Right panel */
    .chat-panel { background: white; border-radius: 12px; border: 1px solid #e8e0d8; display: flex; flex-direction: column; height: 600px; }
    .style-bar { padding: 0.75rem 1rem; border-bottom: 1px solid #e8e0d8; display: flex; gap: 0.5rem; }
    .style-btn { padding: 0.4rem 1rem; border-radius: 6px; border: 1px solid #d4c8bc; background: white; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .style-btn.active { background: #4a3728; color: white; border-color: #4a3728; }
    .messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { max-width: 80%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.875rem; line-height: 1.5; white-space: pre-wrap; }
    .msg.assistant { background: #f3ede8; align-self: flex-start; }
    .msg.user { background: #4a3728; color: white; align-self: flex-end; }
    .msg.error { background: #fee; border: 1px solid #fcc; align-self: flex-start; }
    .typing { align-self: flex-start; background: #f3ede8; padding: 0.75rem 1rem; border-radius: 12px; display: none; }
    .typing span { display: inline-block; width: 8px; height: 8px; background: #8b6f5c; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; margin-right: 4px; }
    .typing span:nth-child(2) { animation-delay: 0.1s; }
    .typing span:nth-child(3) { animation-delay: 0.2s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .input-bar { padding: 1rem; border-top: 1px solid #e8e0d8; display: flex; gap: 0.5rem; }
    .input-bar textarea { flex: 1; resize: none; border: 1px solid #d4c8bc; border-radius: 8px; padding: 0.6rem 0.75rem; font-size: 0.875rem; font-family: inherit; outline: none; }
    .input-bar textarea:focus { border-color: #8b6f5c; }
    .input-bar button { background: #4a3728; color: white; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; font-size: 0.875rem; cursor: pointer; }
    .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 700px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Interior Design AI</h1>
    <p class="subtitle">Upload a photo or describe your space to get personalized suggestions.</p>

    <!-- Left: Upload -->
    <div class="upload-panel">
      <h2>Your Space</h2>
      <div id="dropzone" class="dropzone">
        <p>📷 Drag & drop a photo here<br><small>or click to browse</small></p>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>
      <div id="preview" class="preview" style="display:none">
        <img id="previewImg" alt="Uploaded room">
        <button id="removeBtn" title="Remove image">&times;</button>
      </div>
    </div>

    <!-- Right: Chat -->
    <div class="chat-panel">
      <div class="style-bar">
        <button class="style-btn active" data-style="pinterest">Pinterest Style</button>
        <button class="style-btn" data-style="stock">Stock Style</button>
      </div>
      <div class="messages" id="messages">
        <div class="msg assistant">Hi! I'm your interior design assistant. Upload a photo or describe what you're looking for, and I'll give you personalized suggestions.</div>
      </div>
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
      <div class="input-bar">
        <textarea id="input" rows="2" placeholder="Describe your style or ask for suggestions..."></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8000';
    let uploadedFile = null;
    let style = 'pinterest';

    // Elements
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const removeBtn = document.getElementById('removeBtn');
    const messagesEl = document.getElementById('messages');
    const typingEl = document.getElementById('typing');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    // Style buttons
    document.querySelectorAll('.style-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        style = btn.dataset.style;
      });
    });

    // Drag and drop
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      uploadedFile = file;
      const reader = new FileReader();
      reader.onload = () => { previewImg.src = reader.result; preview.style.display = 'block'; dropzone.style.display = 'none'; };
      reader.readAsDataURL(file);
    }

    removeBtn.addEventListener('click', () => {
      uploadedFile = null;
      preview.style.display = 'none';
      dropzone.style.display = 'block';
      fileInput.value = '';
    });

    // Chat
    function addMessage(role, text, imageUrl) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      if (imageUrl) {
        const imgDiv = document.createElement('div');
        imgDiv.className = 'msg assistant';
        imgDiv.innerHTML = `<img src="${imageUrl}" alt="AI generated design" style="max-width:100%;border-radius:8px;margin-top:0.5rem">`;
        messagesEl.appendChild(imgDiv);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text && !uploadedFile) return;

      addMessage('user', text || '(Uploaded image for analysis)');
      inputEl.value = '';
      sendBtn.disabled = true;
      typingEl.style.display = 'block';
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const formData = new FormData();
        formData.append('message', text || '');
        formData.append('style', style);
        if (uploadedFile) formData.append('image', uploadedFile);

        const resp = await fetch(`${API}/api/v1/suggest`, { method: 'POST', body: formData });
        if (!resp.ok) throw new Error(`Server error: ${resp.status}`);
        const data = await resp.json();
        addMessage('assistant', data.suggestion, data.image_url);
      } catch (err) {
        addMessage('error', `Error: ${err.message}. Make sure the backend is running.`);
      } finally {
        typingEl.style.display = 'none';
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  </script>
</body>
</html>
